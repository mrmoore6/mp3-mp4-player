<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mp3/Mp4 Player</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Mp3 Player</h1>
    <div class="container">
      <div class="player-container">
        <audio id="audioPlayer"></audio>
        <div class="controls">
          <button id="playBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
          </button>
          <button id="muteBtn">Mute</button>
          <button id="darkMode">Dark Mode</button>
          <button id="back10">-10s</button>
          <button id="forward10">+10s</button>
          <button id="nextSong">Next</button>
          <button id="prevSong">Prev</button>
        </div>
      </div>
      <div class="progress-container">
        <div class="progress-fill"></div>
      </div>
    </div>
    <div class="playlist-container">
      <h2>Playlist</h2>
      <div class="file-input-container">
      <label for="fileInput" class="file-input-container">
        <span>Choose Files</span>
        <input type="file" id="fileInput" accept=".mp3,.mp4" multiple />
      </label>
      <p id="noFiles">No files selected</p>
      <ul id="playlist"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
